name: Build & Test Kinetrix
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Compiler
      run: make
      
    - name: Run Test Suite
      run: |
        chmod +x test_all.sh
        ./test_all.sh
      
    - name: Version Check
      run: ./kcc --version
