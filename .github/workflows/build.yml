name: Build & Test Kinetrix
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Compiler
      run: make
      
    - name: Run Test Suite
      run: |
        chmod +x test_all.sh
        ./test_all.sh
      
    - name: Version Check
      run: ./kcc --version

  cross-compile:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Cross Compilers
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64 gcc-aarch64-linux-gnu
        
    - name: Build All Targets
      run: make release
      
    - name: Upload Binaries
      uses: actions/upload-artifact@v3
      with:
        name: Kinetrix-Binaries
        path: build/
